<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mpro ss</title>
  <style>
    /* ===== Foundation ===== */
    :root{--bg:#edf1eb;--sidebar:#18282b;--sidebar-line:rgba(255,255,255,.1);--panel-line:#d7ddd5;--ink:#1f2b2d;--muted:#697574;--accent:#0f7d70;--accent-soft:rgba(15,125,112,.12);--shadow:0 22px 44px rgba(26,31,31,.12);--radius-xl:30px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;color:var(--ink);font-family:"IBM Plex Sans","Segoe UI",sans-serif;background:radial-gradient(circle at 0% 0%,rgba(15,125,112,.16),transparent 28%),radial-gradient(circle at 100% 0%,rgba(185,106,51,.14),transparent 26%),linear-gradient(180deg,#f6f7f4 0%,var(--bg) 52%,#e6ece4 100%)}
    button,input,select,textarea{font:inherit}button,input,select,textarea{border:1px solid transparent;outline:none}
    button{cursor:pointer;min-height:38px;padding:0 14px;border-radius:999px;color:var(--ink);background:linear-gradient(180deg,#ffffff 0%,#eef2eb 100%);box-shadow:0 10px 20px rgba(26,31,31,.08);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease}
    button:hover{transform:translateY(-1px);box-shadow:0 14px 24px rgba(26,31,31,.12)}button.primary,button.active{color:#fff;border-color:rgba(15,125,112,.4);background:linear-gradient(180deg,#179482 0%,#0f7d70 100%);box-shadow:0 16px 30px rgba(15,125,112,.24)}button.ghost{background:transparent;border-color:var(--panel-line);box-shadow:none}button.ghost.active{color:var(--accent);border-color:rgba(15,125,112,.24);background:rgba(15,125,112,.08);box-shadow:none}
    .sidebar button.ghost{color:#edf5f2;border-color:rgba(255,255,255,.58);background:transparent}
    input,select,textarea{width:100%;border-radius:14px;border-color:var(--panel-line);color:var(--ink);background:rgba(255,255,255,.96)}input,select{height:40px;padding:0 11px}textarea{min-height:88px;padding:9px 11px;resize:vertical;line-height:1.42}
    .app{display:grid;grid-template-columns:304px minmax(0,1fr);gap:10px;min-height:100vh;padding:10px}.sidebar{position:sticky;top:10px;align-self:stretch;min-height:calc(100vh - 20px);max-height:none;overflow:visible;display:grid;gap:8px;padding:10px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.02) 100%),linear-gradient(180deg,#1b2d30 0%,#142225 100%);color:#edf5f2;box-shadow:0 20px 40px rgba(12,20,21,.26);border:1px solid rgba(255,255,255,.06);align-content:start}.workspace{min-width:0;display:grid;gap:10px;align-content:start}
    .surface{min-width:0;border-radius:var(--radius-xl);border:1px solid rgba(215,221,213,.9);background:rgba(251,250,246,.94);box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .sidebar h1,.sidebar h2,.sidebar h3,.sidebar h4{margin:0;letter-spacing:-.04em;line-height:1.05}.sidebar h1{font-size:17px;white-space:nowrap}.sidebar h3{font-size:15px}.brand-mark{font-size:27px;font-weight:900;letter-spacing:-.06em;line-height:1;color:#1db19d}
    .badge,.pill{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 9px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.08);color:inherit;font-size:10px;font-weight:800;white-space:nowrap}
    .workspace .badge,.workspace .pill{border-color:var(--panel-line);background:rgba(255,255,255,.86);color:var(--muted)}.pill.accent{color:var(--accent);background:var(--accent-soft);border-color:rgba(15,125,112,.18)}

    /* ===== Auth ===== */
    .auth-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(11,18,20,.42);backdrop-filter:blur(12px)}
    .auth-card{width:min(420px,calc(100vw - 32px));padding:24px;display:grid;gap:16px}
    .auth-brand{justify-self:center;text-align:center;font-size:34px;font-weight:900;letter-spacing:-.07em;line-height:1;color:#1db19d}
    .auth-form{display:grid;gap:10px}
    .auth-input{height:44px;padding:0 14px;border-radius:15px}
    .auth-remember{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);user-select:none}
    .auth-remember input{width:16px;height:16px;flex:0 0 auto;accent-color:#1db19d}
    .auth-submit{position:relative;display:inline-flex;align-items:center;justify-content:center;min-height:42px;font-size:14px;font-weight:800}
    .auth-submit:disabled{cursor:default;opacity:.72}
    .auth-submit-text{transition:opacity .16s ease}
    .auth-submit-spinner{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.28);border-top-color:#fff;opacity:0;pointer-events:none;animation:authSpin .8s linear infinite}
    .auth-submit.is-loading .auth-submit-text{opacity:0}
    .auth-submit.is-loading .auth-submit-spinner{opacity:1}
    .auth-error{padding:10px 12px;border-radius:14px;border:1px solid rgba(185,106,51,.18);background:rgba(185,106,51,.08);color:#8b4f24;font-size:12px;line-height:1.35}
    @keyframes authSpin{to{transform:rotate(360deg)}}

    /* ===== Sidebar ===== */
    .sidebar-top,.sidebar-nav,.sidebar-section,.section-head,.quick-preset-grid,.section-stack,.pinned-grid,.registry-top,.registry-toolbar,.registry-meta,.saved-selection-list,.record-summary,.record-head{display:grid;gap:8px}
    .sidebar-top{position:relative;gap:7px;padding-bottom:10px;border-bottom:none}
    .sidebar-top::after{content:'';position:absolute;left:2px;right:2px;bottom:0;height:1px;background:linear-gradient(90deg,rgba(88,220,194,0) 0%,rgba(88,220,194,.52) 18%,rgba(255,255,255,.28) 50%,rgba(88,220,194,.52) 82%,rgba(88,220,194,0) 100%)}
    .user-session{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;padding:2px 2px 0;border:none;background:transparent}
    .user-session-meta{display:grid;gap:3px;min-width:0;padding-left:2px}
    .user-session-name{font-size:14px;line-height:1.1;font-weight:900;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-session-role{font-size:11px;line-height:1.2;color:rgba(237,245,242,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-session-logout{min-height:30px;padding:0 14px;font-size:12px}
    .sidebar-nav{grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;padding:4px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
    .nav-button{display:flex;align-items:center;justify-content:center;width:100%;min-height:34px;padding:0 10px;text-align:center;line-height:1.1;border-color:transparent;background:transparent;color:#edf5f2;box-shadow:none;font-size:13px;font-weight:700}
    .nav-button:hover{box-shadow:none;transform:none;background:rgba(255,255,255,.06)}
    .nav-button.active{background:linear-gradient(180deg,rgba(23,148,130,.94) 0%,rgba(15,125,112,.94) 100%);border-color:rgba(88,220,194,.34)}
    .sidebar-section{padding:10px;border-radius:16px;border:1px solid var(--sidebar-line);background:rgba(255,255,255,.04)}.section-head{grid-template-columns:minmax(0,1fr) auto;align-items:center}.section-head.centered{grid-template-columns:1fr;justify-items:center;text-align:center}
    .sidebar-group{position:relative;display:grid;gap:8px;padding:16px 0 0;margin-top:2px}
    .sidebar-group::before{content:'';position:absolute;left:2px;right:2px;top:0;height:1px;background:linear-gradient(90deg,rgba(88,220,194,0) 0%,rgba(88,220,194,.52) 18%,rgba(255,255,255,.28) 50%,rgba(88,220,194,.52) 82%,rgba(88,220,194,0) 100%)}
    .sidebar-group-head h3{font-size:17px}
    .sidebar-reset-icon{display:inline-flex;align-items:center;justify-content:center;min-width:26px;width:26px;min-height:26px;height:26px;padding:0!important;flex:0 0 26px;border-radius:50%;border-color:rgba(255,255,255,.18)!important;background:rgba(255,255,255,.06)!important;color:#edf5f2!important;box-shadow:none!important;font-size:0!important;line-height:0!important;overflow:hidden}
    .sidebar-reset-icon:hover{transform:none;box-shadow:none!important;background:rgba(255,255,255,.12)!important}
    .sidebar select option{color:var(--ink);background:#f7faf7}
    .quick-preset-grid{grid-template-columns:1fr}.preset-row{position:relative}.quick-preset{display:grid;grid-template-columns:minmax(0,1fr) 18px;align-items:center;width:100%;min-height:38px;padding:0 12px;text-align:left;line-height:1.15;border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#edf5f2;box-shadow:none;font-size:13px;gap:10px}.quick-preset:hover{box-shadow:none;transform:none;background:rgba(255,255,255,.07)}.quick-preset.active{background:rgba(15,125,112,.18);border-color:rgba(88,220,194,.34);box-shadow:none}.preset-trigger-main{display:block;min-width:0}.preset-trigger-title{display:block;font-weight:800;line-height:1.1}.preset-trigger-value{display:none}.preset-trigger-arrow{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;justify-self:center;align-self:center}.preset-trigger-arrow::before{content:'';display:block;width:7px;height:7px;border-right:2px solid rgba(237,245,242,.86);border-bottom:2px solid rgba(237,245,242,.86);transform:rotate(45deg) translate(-1px,-1px);transform-origin:center;transition:transform .16s ease}.quick-preset[aria-expanded="true"] .preset-trigger-arrow::before{transform:rotate(-135deg) translate(-1px,0)}.preset-menu{display:grid;gap:4px;margin-top:6px;padding:8px 0 0 12px;border:none;background:transparent;box-shadow:none}.preset-option{display:grid;grid-template-columns:16px minmax(0,1fr);align-items:center;justify-content:flex-start;width:100%;min-height:28px;padding:0 2px;text-align:left;border:none;border-radius:0;background:transparent;color:rgba(237,245,242,.88);box-shadow:none;font-size:12px;gap:8px}.preset-option:hover{box-shadow:none;transform:none;background:transparent;color:#fff}.preset-option.active{background:transparent!important;border:none!important;border-color:transparent!important;box-shadow:none!important;color:#fff;text-shadow:0 0 10px rgba(88,220,194,.14)}.preset-option-mark{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:4px;border:1px solid rgba(88,220,194,.45);background:rgba(255,255,255,.03)}.preset-option.active .preset-option-mark{background:rgba(15,125,112,.94);border-color:rgba(88,220,194,.54);box-shadow:0 0 10px rgba(88,220,194,.2)}.preset-option.active .preset-option-mark::before{content:'';display:block;width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(0,-1px)}

    /* ===== Registry ===== */
    .runtime-error-banner{padding:10px 12px;border-radius:18px;border:1px solid rgba(160,78,56,.18);background:rgba(160,78,56,.08);color:#8f452f;font-size:12px;line-height:1.42}
    .copy-toast{position:fixed;right:16px;bottom:16px;z-index:220;display:inline-flex;align-items:center;justify-content:center;min-height:34px;max-width:min(320px,calc(100vw - 32px));padding:0 14px;border-radius:999px;border:1px solid rgba(15,125,112,.2);background:rgba(247,250,248,.98);color:var(--accent);font-size:12px;font-weight:800;line-height:1.2;box-shadow:0 16px 28px rgba(26,31,31,.12);opacity:0;pointer-events:none;transform:translate3d(0,8px,0);transition:opacity .14s ease,transform .14s ease,border-color .14s ease}
    .copy-toast.show{opacity:1;transform:translate3d(0,0,0)}
    .copy-toast.error{border-color:rgba(160,78,56,.18);color:#8f452f}
    .registry-view{padding:12px;display:grid;gap:10px}.registry-top h2,.record-head h2{margin:0;letter-spacing:-.05em;line-height:1.03}.registry-top h2{font-size:24px}.record-head h2{font-size:18px}
    .registry-toolbar{grid-template-columns:minmax(280px,1fr) auto;align-items:center}
    .registry-toolbar.is-bulk-mode{align-items:start}
    .registry-search-shell{display:grid;min-width:0}
    .registry-search-input,.registry-bulk-search{width:100%;border-radius:16px;border-color:var(--panel-line);background:rgba(255,255,255,.96)}
    .registry-search-input{height:36px;padding:0 14px}
    .registry-bulk-search{min-height:40px;max-height:132px;padding:10px 14px;resize:vertical;line-height:1.42}
    .registry-toolbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-self:start}
    .registry-toolbar-actions button,.registry-meta-actions button{min-height:34px;padding:0 14px;font-size:12px;font-weight:700}
    .registry-filter-button{min-width:36px;width:36px;height:36px;padding:0;border:none;border-radius:0;background:transparent!important;color:rgba(31,43,45,.58);box-shadow:none!important}
    .registry-filter-button:hover{background:transparent!important;box-shadow:none!important;color:var(--ink);transform:none}
    .registry-filter-icon{display:inline-grid;justify-items:center;align-content:start;width:14px;height:14px}
    .registry-filter-icon::before{content:'';display:block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid currentColor}
    .registry-filter-icon::after{content:'';display:block;width:4px;height:5px;margin-top:-1px;border-radius:0 0 1px 1px;background:currentColor}
    .registry-filter-button.is-active{color:var(--accent);border-color:transparent;background:transparent!important;box-shadow:none!important}
    .registry-filter-button.is-active:hover{background:transparent!important;color:var(--accent)}
    .registry-columns-panel{display:grid;gap:10px;padding:10px 12px;border-radius:18px;border:1px solid rgba(215,221,213,.92);background:rgba(255,255,255,.76)}
    .registry-columns-panel.hidden{display:none}
    .registry-columns-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .registry-columns-title{display:grid;gap:3px}
    .registry-columns-title strong{font-size:12px;line-height:1.2}
    .registry-columns-title span{font-size:11px;line-height:1.3;color:var(--muted)}
    .registry-columns-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .registry-columns-actions button{min-height:30px;padding:0 10px;font-size:12px}
    .registry-columns-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
    .registry-column-option{display:grid;grid-template-columns:16px minmax(0,1fr);align-items:start;width:100%;min-height:48px;padding:10px;border-radius:14px;border:1px solid rgba(215,221,213,.96);background:rgba(242,244,240,.96);color:var(--ink);box-shadow:none;text-align:left;font-size:12px;font-weight:600;gap:8px}
    .registry-column-option:hover{transform:none;box-shadow:none;background:rgba(246,248,245,.98);border-color:rgba(202,210,204,.96)}
    .registry-column-option.active{background:linear-gradient(180deg,rgba(23,148,130,.14) 0%,rgba(15,125,112,.09) 100%);border-color:rgba(88,220,194,.34)}
    .registry-column-option:disabled{cursor:default;opacity:.82}
    .registry-column-option:disabled:hover{background:rgba(242,244,240,.96);border-color:rgba(215,221,213,.96)}
    .registry-column-option-mark{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:4px;border:1px solid rgba(181,191,183,.96);background:#fff;margin-top:2px}
    .registry-column-option.active .registry-column-option-mark{background:rgba(15,125,112,.94);border-color:rgba(88,220,194,.54)}
    .registry-column-option.active .registry-column-option-mark::before{content:'';display:block;width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(0,-1px)}
    .registry-column-option-main{display:grid;gap:3px;min-width:0}
    .registry-column-option-text{display:block;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .registry-column-option-meta{display:block;font-size:11px;line-height:1.25;color:var(--muted);font-weight:500}
    .registry-bulk-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .registry-bulk-actions button{min-height:30px;padding:0 10px;font-size:12px}
    .registry-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.registry-meta-main,.registry-meta-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.registry-meta-actions{margin-left:auto;justify-content:flex-end}.registry-refresh-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.registry-refresh-button{display:inline-flex;align-items:center;justify-content:center;min-width:30px;min-height:30px;width:30px;height:30px;padding:0;border-radius:999px;font-size:0;line-height:1;flex:0 0 auto}.registry-refresh-icon{display:block;width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.registry-refresh-button.is-loading .registry-refresh-icon{animation:saveSpin .8s linear infinite}.registry-refresh-note{font-size:12px;line-height:1.2;color:var(--muted);white-space:nowrap}.registry-refresh-note.hidden{display:none}.registry-shared-work-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.registry-shared-work-inline.hidden{display:none}.registry-shared-work-inline button{position:relative}.registry-shared-work-inline button.is-loading{padding-left:28px}.registry-shared-work-inline button.is-loading::before{content:'';position:absolute;left:10px;top:50%;width:12px;height:12px;margin-top:-6px;border-radius:50%;border:2px solid rgba(15,125,112,.22);border-top-color:rgba(15,125,112,.92);animation:saveSpin .8s linear infinite}.registry-shared-work-inline .primary.is-loading::before{border-color:rgba(255,255,255,.28);border-top-color:#fff}.registry-columns-toggle-button{min-width:30px;width:30px;height:30px;padding:0;border:none;background:transparent!important;box-shadow:none!important;color:rgba(31,43,45,.72)}.registry-columns-toggle-button:hover{background:transparent!important;box-shadow:none!important;color:var(--ink);transform:none}.registry-columns-toggle-button.active{color:var(--accent)}.registry-admin-mode-button{min-width:176px}.registry-admin-action-button{min-width:34px!important;width:34px!important;height:34px!important;padding:0!important;font-size:18px!important;line-height:1}.registry-admin-action-button:disabled,.registry-admin-mode-button:disabled{opacity:.56;cursor:default}.registry-table-wrap{overflow-y:auto;overflow-x:hidden;border:1px solid var(--panel-line);border-radius:20px;background:rgba(255,255,255,.82);max-height:calc(100vh - 228px);min-height:360px}
    .registry-selection-edit{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;border:1px solid rgba(15,125,112,.18);background:rgba(15,125,112,.08)}
    .registry-selection-edit.hidden{display:none}
    .registry-selection-edit-main{display:grid;gap:4px;min-width:0}
    .registry-selection-edit-title{font-size:12px;line-height:1.2;font-weight:800;color:var(--accent)}
    .registry-selection-edit-sub{font-size:11px;line-height:1.3;color:var(--muted)}
    .registry-selection-edit-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
    .registry-selection-edit-actions button{position:relative;min-height:28px;padding:0 10px;font-size:11px}
    .registry-selection-edit-actions button.is-loading{padding-left:28px}
    .registry-selection-edit-actions button.is-loading::before{content:'';position:absolute;left:10px;top:50%;width:12px;height:12px;margin-top:-6px;border-radius:50%;border:2px solid rgba(15,125,112,.22);border-top-color:rgba(15,125,112,.92);animation:saveSpin .8s linear infinite}
    .registry-selection-edit-actions .primary.is-loading::before{border-color:rgba(255,255,255,.28);border-top-color:#fff}
    .registry-admin-edit{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;border:1px solid rgba(31,43,45,.08);background:rgba(31,43,45,.04)}
    .registry-admin-edit.hidden{display:none}
    .registry-admin-edit-main{display:grid;gap:4px;min-width:0}
    .registry-admin-edit-title{font-size:12px;line-height:1.2;font-weight:800;color:var(--ink)}
    .registry-admin-edit-sub{font-size:11px;line-height:1.3;color:var(--muted)}

    function runServer_(functionName, args) {
      const method = String(functionName || '').trim();

      const payload = Array.isArray(args) ? args : [];

          runner[method].apply(runner, [requestOptions]);

      if (shouldUseServerPostMessageTransport_(method, requestOptions)) {

      return runServerJsonp_(method, requestOptions);

    function runServerJsonp_(functionName, options) {
      return new Promise((resolve, reject) => {
        const apiBaseUrl = getApiBaseUrl_();
        if (!apiBaseUrl) return reject(new Error('API_BASE_URL не задан'));
        const callbackName = `__sf_shell_${Date.now()}_${Math.floor(Math.random() * 1000000)}`;
        const params = new URLSearchParams();
        params.set('api', '1');
        params.set('method', String(functionName || ''));
        params.set('payload', JSON.stringify(options || {}));
        params.set('callback', callbackName);
        const script = document.createElement('script');
        script.async = true;
        script.src = `${apiBaseUrl}?${params.toString()}`;
        let done = false;
        let timeoutId = null;
        const cleanup = () => {
          if (timeoutId) clearTimeout(timeoutId);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
        };
        window[callbackName] = response => {
          if (done) return;
          done = true;
          cleanup();
          if (!response || response.ok === false) return reject(createServerError_(response));
          resolve(response.result);
        };
        script.onerror = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('Не удалось выполнить удаленный запрос.'));
        };
        document.head.appendChild(script);
        timeoutId = setTimeout(() => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('Таймаут удаленного запроса.'));
        }, API_TIMEOUT_MS);
      });
    }

    function shouldUseServerPostMessageTransport_(method, options) {
      if (POST_MESSAGE_SERVER_METHODS.has(method)) return true;
      try {
        return JSON.stringify(options || {}).length > JSONP_MAX_PAYLOAD_CHARS;
      } catch (e) {
        return true;
      }
    }

    function runServerPostMessage_(functionName, options) {
      return new Promise((resolve, reject) => {
        const apiBaseUrl = getApiBaseUrl_();
        if (!apiBaseUrl) return reject(new Error('API_BASE_URL не задан'));
        const requestId = `__sf_shell_post_${Date.now()}_${Math.floor(Math.random() * 1000000)}`;
        const iframe = document.createElement('iframe');
        const form = document.createElement('form');
        let done = false;
        let timeoutId = 0;

        const cleanup = () => {
          if (timeoutId) window.clearTimeout(timeoutId);
          window.removeEventListener('message', handleMessage);
          if (form.parentNode) form.parentNode.removeChild(form);
          if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        };

        const finish = callback => {
          if (done) return;
          done = true;
          cleanup();
          callback();
        };

        const handleMessage = evt => {
          let data = evt ? evt.data : null;
          if (typeof data === 'string') {
            try { data = JSON.parse(data); } catch (e) { data = null; }
          }
          data = data && typeof data === 'object' ? data : null;
          if (!data) return;
          // In some browsers or sandbox modes responses may come through
          // a window proxy that is not strictly equal to iframe.contentWindow.
          // requestId is already cryptographically unique enough for correlation.
          if (String(data.smartFilterShellApi || '') !== 'response') return;
          if (String(data.requestId || '') !== requestId) return;
          finish(() => {
            const response = data.payload || {};
            if (!response || response.ok === false) {
              reject(createServerError_(response));
              return;
            }
            resolve(response.result);
          });
        };

        const appendField = (name, value) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = String(name || '');
          input.value = String(value == null ? '' : value);
          form.appendChild(input);
        };

        iframe.name = requestId;
        iframe.className = 'hidden';
        iframe.setAttribute('aria-hidden', 'true');

        form.method = 'POST';
        form.action = apiBaseUrl;
        form.target = requestId;
        form.className = 'hidden';

        appendField('api', '1');
        appendField('method', String(functionName || ''));
        appendField('payload', JSON.stringify(options || {}));
        appendField('transport', 'postMessage');
        appendField('requestId', requestId);

        window.addEventListener('message', handleMessage);
        document.body.appendChild(iframe);
        document.body.appendChild(form);

        timeoutId = window.setTimeout(() => {
          finish(() => reject(new Error('Таймаут удаленного запроса.')));
        }, API_TIMEOUT_MS);

        try {
          form.submit();
        } catch (error) {
          finish(() => reject(error instanceof Error ? error : new Error(String(error))));
        }
      });
    }

    function createServerError_(raw) {
      const message = String(
        raw && raw.message ||
        raw && raw.error ||
        'Ошибка API'
      );
      const error = new Error(message);
      if (raw && raw.code) error.code = String(raw.code || '').trim();
      if (!error.code && /UNAUTHORIZED/i.test(message)) error.code = 'UNAUTHORIZED';
      return error;
    }

    function parseRuntimeOptions_() {
      const out = {};
      const q = new URLSearchParams(window.location.search || '');
      const spreadsheetId = String(q.get('spreadsheetId') || '').trim();
      const sheetName = String(q.get('sheetName') || '').trim();
      const headerRow = Number(q.get('headerRow'));
      const maxRows = Number(q.get('maxRows'));
      const apiBase = sanitizeApiBaseUrl_(String(q.get('apiBase') || '').trim());
      out.spreadsheetId = spreadsheetId || DEFAULT_SPREADSHEET_ID;
      out.sheetName = sheetName || DEFAULT_SHEET_NAME;
      if (Number.isFinite(headerRow) && headerRow > 0) out.headerRow = Math.floor(headerRow);
      if (Number.isFinite(maxRows) && maxRows > 0) out.maxRows = Math.floor(maxRows);
      if (apiBase) out.apiBase = apiBase;
      return out;
    }

    function getApiBaseUrl_() {
      const fromRuntime = sanitizeApiBaseUrl_((state.runtimeOptions && state.runtimeOptions.apiBase) || '');
      return fromRuntime || API_BASE_URL;
    }

    function sanitizeApiBaseUrl_(value) {
      const normalized = normalizeApiBaseUrl_(value);
      return normalized && ALLOWED_API_BASES.has(normalized) ? normalized : '';
    }

    function normalizeApiBaseUrl_(value) {
      const raw = String(value == null ? '' : value).trim();
      if (!raw) return '';
      try {
        const parsed = new URL(raw, window.location.origin);
        if (!/^https?:$/.test(parsed.protocol)) return '';
        parsed.search = '';
        parsed.hash = '';
        return parsed.toString().replace(/\/+$/, '');
      } catch (e) {
        return '';
      }
    }

      if (stored && stored.user && stored.sessionToken) {

        hideAuthOverlay_();
        loadData_();

      clearCurrentUserSession_();
      showAuthOverlay_();

    async function doLogin_() {
      const passwordInput = el('authPassword');
      const rememberInput = el('authRemember');
      const loginButton = el('btnAuthLogin');
      const password = String(passwordInput && passwordInput.value || '').trim();
      const remember = !!(rememberInput && rememberInput.checked);
      if (!password) {
        showAuthError_('Введите пароль');
        if (passwordInput) passwordInput.focus();
        return;
      }

      loginButton.disabled = true;
      loginButton.classList.add('is-loading');
      hideAuthError_();

      try {
        const nonceResponse = await runServer_('authNonce', [{}]);
        if (!nonceResponse || !nonceResponse.nonceId || !nonceResponse.nonce) {
          throw new Error('Не удалось получить nonce');
        }
        const proof = await sha256HexClient_(`${password}|${nonceResponse.nonce}`);
        const authResponse = await runServer_('auth', [{
          spreadsheetId: state.runtimeOptions.spreadsheetId || DEFAULT_SPREADSHEET_ID,
          nonceId: nonceResponse.nonceId,
          proof,
          remember: remember ? '1' : '0'
        }]);
        if (!authResponse || !authResponse.success || !authResponse.user || !authResponse.sessionToken) {
          throw new Error(authResponse && authResponse.error ? authResponse.error : 'Не удалось выполнить вход');
        }

        setCurrentUserSession_(authResponse.user, authResponse.sessionToken, authResponse.expiresAt || '');
        persistSession_({
          user: authResponse.user,
          sessionToken: authResponse.sessionToken,
          expiresAt: authResponse.expiresAt || ''
        }, { remember });
        persistRememberedAuthPreference_(remember);
        hideAuthOverlay_();

        if (!state.rows.length && !state.loading) {
          loadData_();
        } else {
          renderAll_();
        }
      } catch (err) {
        showAuthError_(err && err.message ? err.message.replace(/^AUTH_[A-Z_]+:\s*/i, '') : 'Ошибка авторизации');
        if (passwordInput) passwordInput.focus();
      } finally {
        loginButton.disabled = false;
        loginButton.classList.remove('is-loading');
      }
    }

    function logout_() {

    function persistSession_(sessionPayload, options) {
      if (!sessionPayload || !sessionPayload.user || !sessionPayload.sessionToken) return;
      const remember = !!(options && options.remember);
      const payload = JSON.stringify({
        user: sessionPayload.user,
        sessionToken: String(sessionPayload.sessionToken || ''),
        expiresAt: String(sessionPayload.expiresAt || '')
      });
      try {
        if (remember) {
          window.localStorage.setItem(SHELL_SESSION_PERSIST_STORAGE_KEY, payload);
          window.sessionStorage.removeItem(SHELL_SESSION_STORAGE_KEY);
        } else {
          window.sessionStorage.setItem(SHELL_SESSION_STORAGE_KEY, payload);
          window.localStorage.removeItem(SHELL_SESSION_PERSIST_STORAGE_KEY);
        }
      } catch (e) {}
    }

    function clearStoredSession_() {
      try {
        window.sessionStorage.removeItem(SHELL_SESSION_STORAGE_KEY);
        window.localStorage.removeItem(SHELL_SESSION_PERSIST_STORAGE_KEY);
      } catch (e) {}
    }

    function readStoredSession_() {
      const candidates = [];
      try { candidates.push(window.sessionStorage.getItem(SHELL_SESSION_STORAGE_KEY)); } catch (e) {}
      try { candidates.push(window.localStorage.getItem(SHELL_SESSION_PERSIST_STORAGE_KEY)); } catch (e) {}
      for (let i = 0; i < candidates.length; i++) {
        const parsed = parseStoredSessionPayload_(candidates[i]);
        if (parsed) return parsed;
      }
      clearStoredSession_();
      return null;
    }

    function parseStoredSessionPayload_(raw) {
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.user || !parsed.sessionToken) return null;
        const expiresAt = String(parsed.expiresAt || '').trim();
        if (expiresAt) {
          const expiryMs = Date.parse(expiresAt);
          if (Number.isFinite(expiryMs) && expiryMs <= Date.now()) return null;
        }
        return {
          user: parsed.user,
          sessionToken: String(parsed.sessionToken || '').trim(),
          expiresAt
        };
      } catch (e) {
        return null;
      }
    }

    function readRememberedAuthPreference_() {
      try {
        const rememberRaw = window.localStorage.getItem(AUTH_REMEMBER_STORAGE_KEY);
        window.localStorage.removeItem(LEGACY_AUTH_PASSWORD_STORAGE_KEY);
        return { remember: rememberRaw === null ? true : rememberRaw === '1' };
      } catch (e) {
        return { remember: true };
      }
    }

    function persistRememberedAuthPreference_(remember) {
      const rememberFlag = !!remember;
      try {
        window.localStorage.setItem(AUTH_REMEMBER_STORAGE_KEY, rememberFlag ? '1' : '0');
        window.localStorage.removeItem(LEGACY_AUTH_PASSWORD_STORAGE_KEY);
      } catch (e) {}
    }

    function applyRememberedAuthPreferenceToForm_() {
      const passwordInput = el('authPassword');
      const rememberInput = el('authRemember');
      if (!passwordInput || !rememberInput) return;
      const remembered = readRememberedAuthPreference_();
      rememberInput.checked = !!remembered.remember;
      passwordInput.value = '';
    }

    async function sha256HexClient_(text) {
      const data = new TextEncoder().encode(String(text || ''));
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function handleUnauthorized_(message) {
      clearStoredSession_();
      clearCurrentUserSession_();
      showAuthOverlay_(message || 'Сессия истекла. Войдите снова.');
    }

    function isUnauthorizedError_(err) {
      const code = String(err && err.code || '').trim().toUpperCase();
      const message = String(err && err.message || '').trim().toUpperCase();

    function buildDataRequestMaxRowsCandidates_() {
      const explicitMaxRows = Number(state.runtimeOptions && state.runtimeOptions.maxRows);
      if (Number.isFinite(explicitMaxRows) && explicitMaxRows > 0) {
        return [Math.floor(explicitMaxRows)];
      }
      if (isGasContext_()) return [0];
      return [0].concat(LOCAL_DATA_REQUEST_MAX_ROWS_FALLBACKS);
    }

    function fetchSmartFilterShellDataWithFallback_(requestOptions) {
      const candidates = buildDataRequestMaxRowsCandidates_();
      const tryRequest = index => {
        const candidate = Number(candidates[index]);
        const nextOptions = { ...(requestOptions || {}) };
        if (Number.isFinite(candidate) && candidate > 0) nextOptions.maxRows = candidate;
        else delete nextOptions.maxRows;
        return runServer_('getSmartFilterShellData', [nextOptions]).then(result => {
          const payload = result && typeof result === 'object' ? { ...result } : {};
          payload.clientRequestedMaxRows = Number.isFinite(candidate) && candidate > 0 ? candidate : 0;
          payload.clientFallbackUsed = index > 0;
          return payload;
        }).catch(error => {
          if (!isAppsScriptApiTimeoutError_(error) || index >= candidates.length - 1) throw error;
          return tryRequest(index + 1);
        });
      };
      return tryRequest(0);
    }

    function hasFocusedInteractiveControl_() {
      const active = document.activeElement;
      if (!active || active === document.body) return false;
      if (active.isContentEditable) return true;
      const tag = String(active.tagName || '').toUpperCase();
      return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || !!active.closest('[contenteditable="true"]');

    function triggerSilentDataRefresh_(options) {
      const settings = options || {};
      if (!settings.allowHidden && document.visibilityState !== 'visible') return Promise.resolve(false);
      if (shouldSkipSilentDataRefresh_(settings)) return Promise.resolve(false);
      if (!settings.force && state.lastDataLoadedAt && (Date.now() - state.lastDataLoadedAt) < SILENT_DATA_REFRESH_MIN_GAP_MS) {

    function scheduleSilentDataWakeRefresh_(options) {
      const settings = options || {};
      if (!state.sessionToken) return;
      if (silentDataRefreshWakeTimer) window.clearTimeout(silentDataRefreshWakeTimer);
      const delayMs = Number.isFinite(Number(settings.delayMs))
        ? Math.max(0, Number(settings.delayMs))
        : SILENT_DATA_REFRESH_WAKE_DELAY_MS;
      silentDataRefreshWakeTimer = window.setTimeout(() => {

        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return {};

            .map(item => ({
              at: Number(item && item.at),

function buildObjectChangeHistoryEntries_(rowIndex, edits) {
      const row = state.rows[rowIndex] || [];

      return (Array.isArray(edits) ? edits : [])
        .map(edit => {
          const colIndex = Number(edit && edit.colIndex);

          const column = state.columns[colIndex];
          const from = getCellValueFromRow_(row, colIndex);
          const to = String(edit && edit.value != null ? edit.value : '').trim();
          if (from === to) return null;
          return {
            at: timestamp,
            colIndex,
            field: String(column && column.label || `Поле ${colIndex + 1}`),
            from,
            to
          };
        })
        .filter(Boolean);
    }

      const key = String(getObjectChangeHistoryKey_(rowIndex) || '').trim();

      if (!nextEntries.length) return;
      const current = Array.isArray(state.changeHistoryByObject[key]) ? state.changeHistoryByObject[key] : [];

        changed = true;

function getPendingEditsForRow_(rowIndex) {
      if (!Number.isFinite(rowIndex) || rowIndex < 0) return [];

      if (!rowMap || !rowMap.size) return [];

        .map(([colIndex, value]) => ({
          rowIndex: Number(rowIndex),

function applySavedEditsLocally_(edits) {
      (Array.isArray(edits) ? edits : []).forEach(edit => {
        const rowIndex = Number(edit && edit.rowIndex);
        const colIndex = Number(edit && edit.colIndex);
        if (!Number.isFinite(rowIndex) || rowIndex < 0) return;
        if (!Number.isFinite(colIndex) || colIndex < 0) return;
        if (!Array.isArray(state.rows[rowIndex])) return;
        state.rows[rowIndex][colIndex] = String(edit && edit.value != null ? edit.value : '');

      const colIndex = Number(entry && entry.colIndex);
      if (!Number.isFinite(colIndex) || colIndex < 0) return false;
      if (isAutoCalculatedFieldColumn_(colIndex)) return false;
      if (!hasLoadedRowDetails_(rowIndex)) return false;
      return getCellValue_(rowIndex, colIndex) !== String(entry && entry.from != null ? entry.from : '').trim();

function restoreHistoryEntry_(rowIndex, historyIndex) {
      const key = getObjectChangeHistoryKey_(rowIndex);
      const entries = key && Array.isArray(state.changeHistoryByObject[key]) ? state.changeHistoryByObject[key] : [];
      const entry = entries[Number(historyIndex)];
      const colIndex = Number(entry && entry.colIndex);
      if (!entry || !Number.isFinite(colIndex) || colIndex < 0) return;
      setEditedValue_(rowIndex, colIndex, String(entry.from != null ? entry.from : ''));

      const key = String(getObjectChangeHistoryKey_(rowIndex) || '').trim();
      if (!key) return;

function saveCurrentObjectEdits_() {
      const rowIndex = Number(state.selectedRowIndex);
      const edits = getPendingEditsForRow_(rowIndex);
      if (!Number.isFinite(rowIndex) || rowIndex < 0 || !hasLoadedRowDetails_(rowIndex) || !edits.length || state.objectSaving) return Promise.resolve();
      const historyEntries = buildObjectChangeHistoryEntries_(rowIndex, edits);

      state.objectSaving = true;
      state.objectSaveError = '';
      state.objectSaveMessage = '';

          rowIndex: item.rowIndex,
          colIndex: item.colIndex,
          value: item.value

      return runServer_('saveSmartFilterShellEdits', [options])

      return ADMIN_REGISTRY_CREATE_FIELDS.reduce((acc, field) => {
        const key = String(field && field.fieldId || '').trim();
        acc[key] = String(source[key] == null ? '' : source[key]).trim();
        return acc;
      }, {});

    function validateAdminRegistryCreatePayload_(payload) {

      if (!String(payload && payload.ro_1_4 || '').trim()) return 'Укажите Код ДС';
      if (!String(payload && payload.ro_1_5 || '').trim()) return 'Укажите наименование объекта';

      state.adminRegistryFormValues = buildEmptyAdminRegistryFormValues_();
      renderAll_();

    async function submitAdminRegistryCreate_() {
      if (!isAdminRegistryEditMode_() || !state.adminRegistryDialogOpen || state.adminRegistryDialogSaving) return;
      const payload = buildAdminRegistryCreatePayload_();
      const validationError = validateAdminRegistryCreatePayload_(payload);
      if (validationError) {
        state.adminRegistryDialogError = validationError;
        renderAll_();
        return;

      state.adminRegistryDialogSaving = true;
      state.adminRegistryDialogError = '';
      renderAll_();
      try {

      const rowIndexes = getAdminRegistrySelectedRowIndexes_();
      if (!rowIndexes.length) return;
      const hasPendingEdits = hasPendingObjectEdits_();
      const confirmed = window.confirm(
        `Удалить выбранные строки (${rowIndexes.length})?` +
        (hasPendingEdits ? '\n\nЕсть несохраненные изменения в карточке объекта. Они будут потеряны.' : '')
      );
      if (!confirmed) return;
      state.adminRegistryPendingAction = 'delete';
      renderRegistryView_();
      try {
        const result = await runServer_('deleteSmartFilterShellRegistryRows', [{
          spreadsheetId: state.runtimeOptions.spreadsheetId || DEFAULT_SPREADSHEET_ID,
          sheetName: state.runtimeOptions.sheetName || DEFAULT_SHEET_NAME,
          headerRow: state.runtimeOptions.headerRow || DEFAULT_HEADER_ROW,

function buildDefaultSavedSelectionGroupsOpen_() {

function normalizeSavedSelectionGroupsOpen_(rawValue) {

function normalizeSavedSelectionExpandedById_(rawValue) {

function buildSavedSelectionsPanelSummary_() {

function syncSavedSelectionsPanelChrome_() {

function toggleSavedSelectionsPanel_() {

function toggleSavedSelectionGroup_(groupKey) {

function toggleSavedSelectionExpanded_(selectionId, nextValue) {

function toggleRegistrySelectionComposer_() {

function setRegistrySelectionComposerScope_(scope) {
      const requestedMode = normalizeRegistrySelectionScope_(scope);
      const mode = (requestedMode === 'division' && !canUseDivisionRegistrySelectionScope_())
        ? 'personal'
        : requestedMode;
      el('btnSelectionScopePersonal').classList.toggle('active', mode === 'personal');
      el('btnSelectionScopeDivision').classList.toggle('active', mode === 'division');
      el('btnSelectionScopeShared').classList.toggle('active', mode === 'shared');
      syncRegistrySelectionComposerUi_();
